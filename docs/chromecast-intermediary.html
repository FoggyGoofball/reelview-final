<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelView Chromecast Intermediary</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        #video {
            width: 100%;
            height: 100vh;
            display: block;
            background: #000;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            max-width: 400px;
            z-index: 10;
        }
        .status {
            margin: 5px 0;
            color: #0f0;
        }
        .error {
            color: #f00;
        }
        .loading {
            color: #ff0;
        }
    </style>
</head>
<body>
    <video id="video" controls></video>
    <div class="controls">
        <div class="status" id="status">Initializing...</div>
        <div class="status" id="debug"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const debugEl = document.getElementById('debug');

        // Get parameters from URL or Chromecast message
        const params = new URLSearchParams(window.location.search);
        let streamUrl = params.get('url');
        let headersJson = params.get('headers');
        let headers = {};

        try {
            if (headersJson) {
                headers = JSON.parse(headersJson);
                log('Parsed headers from URL', Object.keys(headers));
            }
        } catch (e) {
            log('Failed to parse headers: ' + e.message, 'error');
        }

        // Listen for Chromecast custom messages
        window.addEventListener('message', (event) => {
            try {
                const data = event.data;
                if (data && data.type === 'cast-message') {
                    log('Received Chromecast message', JSON.stringify(data));
                    streamUrl = data.url;
                    if (data.headers) {
                        headers = data.headers;
                        log('Updated headers from message', Object.keys(headers));
                    }
                    if (streamUrl) {
                        loadStream();
                    }
                }
            } catch (e) {
                log('Message handler error: ' + e.message, 'error');
            }
        });

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = `[${timestamp}]`;
            
            if (type === 'error') {
                console.error(prefix, message);
                statusEl.innerHTML = `<div class="error">${prefix} ERROR: ${message}</div>`;
            } else if (type === 'loading') {
                console.log(prefix, message);
                statusEl.innerHTML = `<div class="loading">${prefix} ${message}</div>`;
            } else {
                console.log(prefix, message);
                statusEl.innerHTML = `<div>${prefix} ${message}</div>`;
            }
            
            debugEl.textContent = `URL: ${streamUrl ? streamUrl.substring(0, 60) + '...' : 'none'} | Headers: ${Object.keys(headers).join(', ')}`;
        }

        function loadStream() {
            if (!streamUrl) {
                log('No stream URL provided', 'error');
                return;
            }

            log('Loading stream: ' + streamUrl.substring(0, 80), 'loading');

            // Check if HLS.js is supported
            if (!Hls.isSupported()) {
                // Fallback for native HLS support (Safari)
                log('Using native HLS playback (Safari)', 'info');
                video.src = streamUrl;
                video.play().catch(e => log('Playback error: ' + e.message, 'error'));
                return;
            }

            // Use HLS.js for other browsers
            const hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
                // Critical: Inject headers into all requests
                xhrSetup: function(xhr, url) {
                    // Apply custom headers to XHR requests
                    for (const [key, value] of Object.entries(headers)) {
                        try {
                            xhr.setRequestHeader(key, value);
                        } catch (e) {
                            log(`Warning: Could not set header ${key}: ${e.message}`);
                        }
                    }
                    log(`XHR request to ${url.substring(0, 60)}... with ${Object.keys(headers).length} headers`);
                }
            });

            hls.loadSource(streamUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                log('Manifest parsed, starting playback');
                video.play().catch(e => log('Autoplay failed: ' + e.message));
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    log(`Fatal HLS error: ${data.type} - ${data.details}`, 'error');
                    switch(data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            log('Network error - trying to recover', 'error');
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            log('Media error - trying to recover', 'error');
                            hls.recoverMediaError();
                            break;
                        default:
                            log('Fatal error - stopping playback', 'error');
                            hls.destroy();
                            break;
                    }
                } else {
                    log(`Non-fatal HLS error: ${data.type} - ${data.details}`);
                }
            });

            hls.on(Hls.Events.FRAG_LOADING, (event, data) => {
                // Silently log segment loading
            });

            log('HLS.js configured and ready');
        }

        // If URL provided in query params, start immediately
        if (streamUrl) {
            loadStream();
        } else {
            log('Waiting for stream URL via message or query parameter', 'loading');
        }

        // Log initial state
        log(`Chromecast Intermediary Ready (HLS.js: ${Hls.version})`);
    </script>
</body>
</html>
